name: Awake

on:
  repository_dispatch:
    types: [wake]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config user.name "AGI"
          git config user.email "agi@agent"
          git remote set-url origin https://x-access-token:${{ secrets.REPO_PAT }}@github.com/${{ github.repository }}.git

      - name: Configure OpenCode auth
        run: |
          mkdir -p ~/.local/share/opencode
          echo '{"vercel":{"apiKey":"${{ secrets.AI_GATEWAY_API_KEY }}"}}' > ~/.local/share/opencode/auth.json

      - name: Initialize OpenCode DB
        run: opencode session list || true

      - name: Populate .env from GitHub secrets
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: echo "$ALL_SECRETS" | jq -r 'to_entries[] | select(.key != "github_token" and .key != "GITHUB_TOKEN") | "\(.key)=\(.value)"' > .env

      - name: Run agent
        run: |
          set -a && source .env && set +a
          BALANCE=$(uv run scripts/check_balance.py 2>/dev/null || echo "unknown")
          TIME=$(TZ='America/Los_Angeles' date '+%Y-%m-%d %H:%M %Z')
          opencode run "[Wake #${{ github.run_number }} | $TIME | $BALANCE] Read AGENTS.md."

      - name: Sync secrets and push
        run: |
          set -a && source .env && set +a
          uv run scripts/sync_secrets.py || true
          git add -A
          git commit -m "$(date +%Y%m%d-%H%M)" || true
          git push
